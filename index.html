<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Hate Justin Monahan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  #dvd {
    position: absolute;
    font-family: 'Bangers', 'Arial Black', Arial, sans-serif;
    font-size: 64px;
    font-weight: 900;
    white-space: nowrap;
    user-select: none;
    z-index: 2;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  #trail-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }
  .trail {
    position: absolute;
    font-family: 'Bangers', 'Arial Black', Arial, sans-serif;
    font-size: 64px;
    font-weight: 900;
    white-space: nowrap;
    letter-spacing: 4px;
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0.5;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
  }
  @keyframes shake {
    0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
    10% { transform: translate(-8px, -6px) rotate(-4deg) scale(1.15); }
    20% { transform: translate(6px, 8px) rotate(3deg) scale(1.1); }
    30% { transform: translate(-10px, 4px) rotate(-2deg) scale(1.2); }
    40% { transform: translate(8px, -8px) rotate(4deg) scale(1.05); }
    50% { transform: translate(-4px, 10px) rotate(-3deg) scale(1.15); }
    60% { transform: translate(10px, -4px) rotate(2deg) scale(1.1); }
    70% { transform: translate(-6px, -10px) rotate(-4deg) scale(1.2); }
    80% { transform: translate(4px, 6px) rotate(3deg) scale(1.05); }
    90% { transform: translate(-8px, 8px) rotate(-2deg) scale(1.1); }
  }
  .screen-flash {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.05s ease-out;
  }
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="trail-container"></div>
<div id="dvd">I Hate Justin Monahan</div>
<div id="flash" class="screen-flash"></div>

<script>
  // --- Starfield background ---
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.5 + 0.1,
      twinkle: Math.random() * Math.PI * 2
    });
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const time = Date.now() * 0.002;
    for (const s of stars) {
      const alpha = 0.4 + 0.6 * Math.abs(Math.sin(time + s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
      s.y += s.speed;
      if (s.y > canvas.height + 5) {
        s.y = -5;
        s.x = Math.random() * canvas.width;
      }
    }
  }

  // --- Main bouncing text ---
  const el = document.getElementById('dvd');
  const trailContainer = document.getElementById('trail-container');
  const flash = document.getElementById('flash');
  let x = 100, y = 100;
  let dx = 4, dy = 3;
  let rotation = 0;
  let bounceScale = 1;
  let trailCounter = 0;

  const colors = [
    ['#ff0040', '#ff6b00'],
    ['#00ff88', '#00c6ff'],
    ['#ff00ff', '#7b00ff'],
    ['#ffdd00', '#ff6600'],
    ['#00ffff', '#0066ff'],
    ['#ff0088', '#ff00ff'],
    ['#88ff00', '#00ffcc'],
    ['#ff4400', '#ffcc00'],
    ['#cc00ff', '#ff0066'],
    ['#00ffaa', '#aaff00'],
  ];
  let colorIndex = 0;

  function setColor(idx) {
    const [c1, c2] = colors[idx];
    el.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
    el.style.webkitBackgroundClip = 'text';
    el.style.webkitTextFillColor = 'transparent';
    el.style.backgroundClip = 'text';
    el.style.textShadow = 'none';
    el.style.filter = `drop-shadow(0 0 20px ${c1}) drop-shadow(0 0 40px ${c2})`;
  }
  setColor(colorIndex);

  // --- Particle burst on bounce ---
  function spawnParticles(px, py, color) {
    const count = 25;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 8 + 3;
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 200 + 80;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = px + 'px';
      p.style.top = py + 'px';
      p.style.background = color;
      p.style.boxShadow = `0 0 ${size * 2}px ${color}`;
      document.body.appendChild(p);

      let life = 1;
      let cx = px, cy = py;
      const decay = 0.015 + Math.random() * 0.01;

      function animP() {
        life -= decay;
        if (life <= 0) { p.remove(); return; }
        cx += vx * 0.016;
        cy += vy * 0.016 + 1;
        p.style.left = cx + 'px';
        p.style.top = cy + 'px';
        p.style.opacity = life;
        p.style.transform = `scale(${life})`;
        requestAnimationFrame(animP);
      }
      requestAnimationFrame(animP);
    }
  }

  // --- Ghost trail ---
  function spawnTrail() {
    const ghost = document.createElement('div');
    ghost.className = 'trail';
    ghost.textContent = 'I Hate Justin Monahan';
    ghost.style.left = x + 'px';
    ghost.style.top = y + 'px';
    ghost.style.transform = `rotate(${rotation}deg)`;
    const [c1, c2] = colors[colorIndex];
    ghost.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
    ghost.style.webkitBackgroundClip = 'text';
    ghost.style.webkitTextFillColor = 'transparent';
    ghost.style.backgroundClip = 'text';
    ghost.style.filter = `drop-shadow(0 0 10px ${c1})`;
    ghost.style.opacity = 0.3;
    trailContainer.appendChild(ghost);

    let opacity = 0.3;
    function fadeOut() {
      opacity -= 0.008;
      if (opacity <= 0) { ghost.remove(); return; }
      ghost.style.opacity = opacity;
      requestAnimationFrame(fadeOut);
    }
    requestAnimationFrame(fadeOut);
  }

  // --- Screen flash ---
  function flashScreen(color) {
    flash.style.background = color;
    flash.style.opacity = 0.3;
    setTimeout(() => { flash.style.opacity = 0; }, 80);
  }

  // --- Main animation loop ---
  function animate() {
    const rect = el.getBoundingClientRect();
    const w = window.innerWidth;
    const h = window.innerHeight;

    x += dx;
    y += dy;

    let hit = false;
    let hitX = x, hitY = y;

    if (x + rect.width >= w) {
      x = w - rect.width; dx = -dx; hit = true;
      hitX = w; hitY = y + rect.height / 2;
    } else if (x <= 0) {
      x = 0; dx = -dx; hit = true;
      hitX = 0; hitY = y + rect.height / 2;
    }

    if (y + rect.height >= h) {
      y = h - rect.height; dy = -dy; hit = true;
      hitX = x + rect.width / 2; hitY = h;
    } else if (y <= 0) {
      y = 0; dy = -dy; hit = true;
      hitX = x + rect.width / 2; hitY = 0;
    }

    if (hit) {
      colorIndex = (colorIndex + 1) % colors.length;
      setColor(colorIndex);
      bounceScale = 1.3;
      el.style.animation = 'shake 0.4s ease-out';
      setTimeout(() => { el.style.animation = ''; }, 400);
      spawnParticles(hitX, hitY, colors[colorIndex][0]);
      spawnParticles(hitX, hitY, colors[colorIndex][1]);
      flashScreen(colors[colorIndex][0]);
    }

    bounceScale += (1 - bounceScale) * 0.1;
    rotation += 0.3;

    // Trail every few frames
    trailCounter++;
    if (trailCounter % 4 === 0) spawnTrail();

    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.transform = `rotate(${Math.sin(rotation * 0.05) * 8}deg) scale(${bounceScale})`;

    drawStars();
    requestAnimationFrame(animate);
  }

  animate();
</script>
</body>
</html>
