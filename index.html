<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Hate Justin Monahan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }
  canvas#bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  #dvd {
    position: absolute;
    font-family: 'Bangers', 'Arial Black', Arial, sans-serif;
    font-size: 64px;
    font-weight: 900;
    white-space: nowrap;
    user-select: none;
    z-index: 2;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  #trail-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }
  .trail {
    position: absolute;
    font-family: 'Bangers', 'Arial Black', Arial, sans-serif;
    font-size: 64px;
    font-weight: 900;
    white-space: nowrap;
    letter-spacing: 4px;
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0.5;
  }
  .particle {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
  }
  @keyframes shake {
    0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
    10% { transform: translate(-8px, -6px) rotate(-4deg) scale(1.15); }
    20% { transform: translate(6px, 8px) rotate(3deg) scale(1.1); }
    30% { transform: translate(-10px, 4px) rotate(-2deg) scale(1.2); }
    40% { transform: translate(8px, -8px) rotate(4deg) scale(1.05); }
    50% { transform: translate(-4px, 10px) rotate(-3deg) scale(1.15); }
    60% { transform: translate(10px, -4px) rotate(2deg) scale(1.1); }
    70% { transform: translate(-6px, -10px) rotate(-4deg) scale(1.2); }
    80% { transform: translate(4px, 6px) rotate(3deg) scale(1.05); }
    90% { transform: translate(-8px, 8px) rotate(-2deg) scale(1.1); }
  }
  .screen-flash {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: opacity 0.05s ease-out;
  }
  #caption {
    position: fixed;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Bangers', 'Arial Black', Arial, sans-serif;
    font-size: 32px;
    color: #fff;
    text-align: center;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    text-shadow: 0 0 10px rgba(255,0,64,0.8), 0 0 30px rgba(255,0,64,0.4), 2px 2px 0 #000;
    background: rgba(0,0,0,0.6);
    padding: 12px 28px;
    border-radius: 8px;
    letter-spacing: 2px;
    max-width: 90vw;
    transition: opacity 0.3s ease;
  }
</style>
</head>
<body>
<div id="start-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:999;display:flex;align-items:center;justify-content:center;cursor:pointer;">
  <div style="text-align:center;font-family:'Bangers',Arial,sans-serif;color:#ff0040;font-size:48px;text-shadow:0 0 30px #ff0040,0 0 60px #ff6b00;letter-spacing:4px;">
    CLICK TO UNLEASH HATRED
    <div style="font-size:20px;color:#888;margin-top:20px;text-shadow:none;">🔊 sound on 🔊</div>
  </div>
</div>
<canvas id="bg"></canvas>
<div id="trail-container"></div>
<div id="dvd">I Hate Justin Monahan</div>
<div id="flash" class="screen-flash"></div>
<div id="caption"></div>

<script>
  // --- INTENSE PROCEDURAL MUSIC ENGINE ---
  let audioStarted = false;

  function startMusic() {
    if (audioStarted) return;
    audioStarted = true;

    const AC = new (window.AudioContext || window.webkitAudioContext)();
    const master = AC.createGain();
    master.gain.value = 0.7;
    master.connect(AC.destination);

    // Compressor to glue it together
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -20;
    comp.ratio.value = 12;
    comp.attack.value = 0.002;
    comp.release.value = 0.1;
    comp.connect(master);

    // Distortion curve
    function makeDistCurve(amount) {
      const n = 44100, curve = new Float32Array(n);
      for (let i = 0; i < n; i++) {
        const x = (i * 2) / n - 1;
        curve[i] = ((3 + amount) * x * 20 * (Math.PI / 180)) / (Math.PI + amount * Math.abs(x));
      }
      return curve;
    }

    const BPM = 150;
    const beatTime = 60 / BPM;
    const barTime = beatTime * 4;
    let nextBeat = AC.currentTime + 0.05;

    // Bass notes pattern (minor key madness)
    const bassNotes = [55, 55, 65.41, 73.42, 55, 55, 82.41, 73.42]; // A1, A1, C2, D2, A1, A1, E2, D2
    let bassIndex = 0;

    // Lead melody pattern
    const leadNotes = [440, 523.25, 587.33, 523.25, 659.25, 587.33, 523.25, 440,
                       392, 440, 523.25, 440, 349.23, 392, 440, 523.25];
    let leadIndex = 0;

    function kick(time) {
      const osc = AC.createOscillator();
      const gain = AC.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(150, time);
      osc.frequency.exponentialRampToValueAtTime(30, time + 0.12);
      gain.gain.setValueAtTime(1.0, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
      osc.connect(gain);
      gain.connect(comp);
      osc.start(time);
      osc.stop(time + 0.3);

      // Click layer
      const click = AC.createOscillator();
      const clickGain = AC.createGain();
      click.type = 'square';
      click.frequency.setValueAtTime(800, time);
      click.frequency.exponentialRampToValueAtTime(100, time + 0.02);
      clickGain.gain.setValueAtTime(0.6, time);
      clickGain.gain.exponentialRampToValueAtTime(0.001, time + 0.03);
      click.connect(clickGain);
      clickGain.connect(comp);
      click.start(time);
      click.stop(time + 0.05);
    }

    function snare(time) {
      // Noise burst
      const bufSize = AC.sampleRate * 0.15;
      const buf = AC.createBuffer(1, bufSize, AC.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = AC.createBufferSource();
      noise.buffer = buf;
      const noiseGain = AC.createGain();
      noiseGain.gain.setValueAtTime(0.8, time);
      noiseGain.gain.exponentialRampToValueAtTime(0.001, time + 0.15);
      const hipass = AC.createBiquadFilter();
      hipass.type = 'highpass';
      hipass.frequency.value = 2000;
      noise.connect(hipass);
      hipass.connect(noiseGain);
      noiseGain.connect(comp);
      noise.start(time);
      noise.stop(time + 0.15);

      // Body
      const osc = AC.createOscillator();
      const oscGain = AC.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(200, time);
      osc.frequency.exponentialRampToValueAtTime(80, time + 0.05);
      oscGain.gain.setValueAtTime(0.7, time);
      oscGain.gain.exponentialRampToValueAtTime(0.001, time + 0.1);
      osc.connect(oscGain);
      oscGain.connect(comp);
      osc.start(time);
      osc.stop(time + 0.1);
    }

    function hihat(time, open) {
      const bufSize = AC.sampleRate * (open ? 0.15 : 0.05);
      const buf = AC.createBuffer(1, bufSize, AC.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
      const noise = AC.createBufferSource();
      noise.buffer = buf;
      const gain = AC.createGain();
      gain.gain.setValueAtTime(open ? 0.25 : 0.2, time);
      gain.gain.exponentialRampToValueAtTime(0.001, time + (open ? 0.15 : 0.05));
      const hp = AC.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 7000;
      noise.connect(hp);
      hp.connect(gain);
      gain.connect(comp);
      noise.start(time);
      noise.stop(time + (open ? 0.2 : 0.06));
    }

    function bass(time, freq) {
      const osc = AC.createOscillator();
      const osc2 = AC.createOscillator();
      const gain = AC.createGain();
      const dist = AC.createWaveShaper();
      dist.curve = makeDistCurve(50);
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      osc2.type = 'square';
      osc2.frequency.value = freq * 1.005;
      gain.gain.setValueAtTime(0.35, time);
      gain.gain.setValueAtTime(0.35, time + beatTime * 0.8);
      gain.gain.exponentialRampToValueAtTime(0.001, time + beatTime * 0.95);
      const lp = AC.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.setValueAtTime(300, time);
      lp.frequency.linearRampToValueAtTime(800, time + beatTime * 0.3);
      lp.frequency.linearRampToValueAtTime(200, time + beatTime * 0.8);
      lp.Q.value = 8;
      osc.connect(gain);
      osc2.connect(gain);
      gain.connect(dist);
      dist.connect(lp);
      lp.connect(comp);
      osc.start(time);
      osc.stop(time + beatTime);
      osc2.start(time);
      osc2.stop(time + beatTime);
    }

    function lead(time, freq) {
      const osc = AC.createOscillator();
      const osc2 = AC.createOscillator();
      const gain = AC.createGain();
      const dist = AC.createWaveShaper();
      dist.curve = makeDistCurve(80);
      osc.type = 'sawtooth';
      osc.frequency.value = freq;
      osc2.type = 'sawtooth';
      osc2.frequency.value = freq * 1.01;
      const halfBeat = beatTime * 0.5;
      gain.gain.setValueAtTime(0.001, time);
      gain.gain.linearRampToValueAtTime(0.15, time + 0.02);
      gain.gain.setValueAtTime(0.15, time + halfBeat * 0.7);
      gain.gain.exponentialRampToValueAtTime(0.001, time + halfBeat * 0.95);
      const lp = AC.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.setValueAtTime(1200, time);
      lp.frequency.linearRampToValueAtTime(3000, time + halfBeat * 0.3);
      lp.frequency.linearRampToValueAtTime(800, time + halfBeat * 0.8);
      lp.Q.value = 5;
      osc.connect(gain);
      osc2.connect(gain);
      gain.connect(dist);
      dist.connect(lp);
      lp.connect(comp);
      osc.start(time);
      osc.stop(time + halfBeat);
      osc2.start(time);
      osc2.stop(time + halfBeat);
    }

    function scheduleBar(barStart) {
      for (let beat = 0; beat < 4; beat++) {
        const t = barStart + beat * beatTime;

        // Kick on every beat
        kick(t);

        // Snare on 2 and 4
        if (beat === 1 || beat === 3) snare(t);

        // Hi-hats: 8th notes
        hihat(t, false);
        hihat(t + beatTime * 0.5, beat === 3);

        // Bass on every beat
        bass(t, bassNotes[bassIndex % bassNotes.length]);
        bassIndex++;

        // Lead: 8th notes
        lead(t, leadNotes[leadIndex % leadNotes.length]);
        leadIndex++;
        lead(t + beatTime * 0.5, leadNotes[leadIndex % leadNotes.length]);
        leadIndex++;
      }
    }

    // Schedule ahead loop
    function scheduler() {
      while (nextBeat < AC.currentTime + 0.3) {
        scheduleBar(nextBeat);
        nextBeat += barTime;
      }
      setTimeout(scheduler, 100);
    }
    scheduler();

    // --- Creepy insult voice every 5 seconds ---
    const insults = [
      'Justin... I hate you...',
      'Justin... you are the worst...',
      'Justin... nobody likes you...',
      'Justin... you disgust me...',
      'Justin... why are you like this...',
      'Justin... you absolute clown...',
      'Justin... you make me sick...',
      'Justin... you ruined everything...',
      'Justin... what a disappointment...',
      'Justin... you are insufferable...',
      'Justin... I cannot stand you...',
      'Justin... you are a menace...',
      'Justin... go away... forever...',
      'Justin... you wet sock of a human...',
      'Justin... you are aggressively mediocre...',
      'Justin... even your shadow wants to leave...',
      'Justin... you are the human equivalent of a participation trophy...',
      'Justin... you bring nothing to the table...',
      'Justin... you are a walking L...',
      'Justin... the audacity... the sheer audacity...',
      'Justin... you are why we can\'t have nice things...',
      'Justin... I hope you step on a lego...',
      'Justin... you are the soggy cereal of people...',
      'Justin... your vibe is rancid...',
      'Justin... even autocorrect gives up on you...',
      'Justin... you peaked in kindergarten...',
      'Justin... you are a human speed bump...',
      'Justin... you have the charisma of a wet paper towel...',
      'Justin... you are spare parts, bud...',
      'Justin... you couldn\'t pour water out of a boot with instructions on the heel...',
      'Justin... you are the reason shampoo has instructions...',
    ];
    let insultIndex = Math.floor(Math.random() * insults.length);

    const captionEl = document.getElementById('caption');
    let captionTimeout = null;

    function speakJustin() {
      const text = insults[insultIndex % insults.length];
      insultIndex++;
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.7;
      utterance.pitch = 0.3;
      utterance.volume = 1.0;
      // Pick a deep/creepy voice if available
      const voices = speechSynthesis.getVoices();
      const preferred = voices.find(v => /male/i.test(v.name) && !/female/i.test(v.name))
        || voices.find(v => /daniel|david|james|george/i.test(v.name))
        || voices[0];
      if (preferred) utterance.voice = preferred;

      // Show caption
      captionEl.textContent = text;
      captionEl.style.opacity = '1';
      if (captionTimeout) clearTimeout(captionTimeout);
      utterance.onend = () => {
        captionTimeout = setTimeout(() => {
          captionEl.style.opacity = '0';
        }, 500);
      };
      // Fallback hide in case onend doesn't fire
      captionTimeout = setTimeout(() => {
        captionEl.style.opacity = '0';
      }, 4500);

      speechSynthesis.speak(utterance);

      // Lower music during speech, bring it back after
      master.gain.linearRampToValueAtTime(0.25, AC.currentTime + 0.1);
      utterance.onend = () => {
        master.gain.linearRampToValueAtTime(0.7, AC.currentTime + 0.3);
        captionTimeout = setTimeout(() => {
          captionEl.style.opacity = '0';
        }, 500);
      };
    }

    // Voices may load async
    if (speechSynthesis.getVoices().length === 0) {
      speechSynthesis.addEventListener('voiceschanged', () => {}, { once: true });
    }

    // First one after 2s, then every 5s
    setTimeout(() => {
      speakJustin();
      setInterval(speakJustin, 5000);
    }, 2000);
  }

  // Click to start (required for audio context)
  document.getElementById('start-overlay').addEventListener('click', function() {
    this.style.display = 'none';
    startMusic();
  });

  // --- Starfield background ---
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 0.5,
      speed: Math.random() * 0.5 + 0.1,
      twinkle: Math.random() * Math.PI * 2
    });
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const time = Date.now() * 0.002;
    for (const s of stars) {
      const alpha = 0.4 + 0.6 * Math.abs(Math.sin(time + s.twinkle));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
      s.y += s.speed;
      if (s.y > canvas.height + 5) {
        s.y = -5;
        s.x = Math.random() * canvas.width;
      }
    }
  }

  // --- Main bouncing text ---
  const el = document.getElementById('dvd');
  const trailContainer = document.getElementById('trail-container');
  const flash = document.getElementById('flash');
  let x = 100, y = 100;
  let dx = 4, dy = 3;
  let rotation = 0;
  let bounceScale = 1;
  let trailCounter = 0;

  const colors = [
    ['#ff0040', '#ff6b00'],
    ['#00ff88', '#00c6ff'],
    ['#ff00ff', '#7b00ff'],
    ['#ffdd00', '#ff6600'],
    ['#00ffff', '#0066ff'],
    ['#ff0088', '#ff00ff'],
    ['#88ff00', '#00ffcc'],
    ['#ff4400', '#ffcc00'],
    ['#cc00ff', '#ff0066'],
    ['#00ffaa', '#aaff00'],
  ];
  let colorIndex = 0;

  function setColor(idx) {
    const [c1, c2] = colors[idx];
    el.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
    el.style.webkitBackgroundClip = 'text';
    el.style.webkitTextFillColor = 'transparent';
    el.style.backgroundClip = 'text';
    el.style.textShadow = 'none';
    el.style.filter = `drop-shadow(0 0 20px ${c1}) drop-shadow(0 0 40px ${c2})`;
  }
  setColor(colorIndex);

  // --- Particle burst on bounce ---
  function spawnParticles(px, py, color) {
    const count = 25;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 8 + 3;
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 200 + 80;
      const vx = Math.cos(angle) * speed;
      const vy = Math.sin(angle) * speed;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = px + 'px';
      p.style.top = py + 'px';
      p.style.background = color;
      p.style.boxShadow = `0 0 ${size * 2}px ${color}`;
      document.body.appendChild(p);

      let life = 1;
      let cx = px, cy = py;
      const decay = 0.015 + Math.random() * 0.01;

      function animP() {
        life -= decay;
        if (life <= 0) { p.remove(); return; }
        cx += vx * 0.016;
        cy += vy * 0.016 + 1;
        p.style.left = cx + 'px';
        p.style.top = cy + 'px';
        p.style.opacity = life;
        p.style.transform = `scale(${life})`;
        requestAnimationFrame(animP);
      }
      requestAnimationFrame(animP);
    }
  }

  // --- Ghost trail ---
  function spawnTrail() {
    const ghost = document.createElement('div');
    ghost.className = 'trail';
    ghost.textContent = 'I Hate Justin Monahan';
    ghost.style.left = x + 'px';
    ghost.style.top = y + 'px';
    ghost.style.transform = `rotate(${rotation}deg)`;
    const [c1, c2] = colors[colorIndex];
    ghost.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
    ghost.style.webkitBackgroundClip = 'text';
    ghost.style.webkitTextFillColor = 'transparent';
    ghost.style.backgroundClip = 'text';
    ghost.style.filter = `drop-shadow(0 0 10px ${c1})`;
    ghost.style.opacity = 0.3;
    trailContainer.appendChild(ghost);

    let opacity = 0.3;
    function fadeOut() {
      opacity -= 0.008;
      if (opacity <= 0) { ghost.remove(); return; }
      ghost.style.opacity = opacity;
      requestAnimationFrame(fadeOut);
    }
    requestAnimationFrame(fadeOut);
  }

  // --- Screen flash ---
  function flashScreen(color) {
    flash.style.background = color;
    flash.style.opacity = 0.3;
    setTimeout(() => { flash.style.opacity = 0; }, 80);
  }

  // --- Floating middle finger emojis ---
  const fingerEmojis = [];
  const MAX_FINGERS = 15;
  let fingerSpawnTimer = 0;

  function spawnFinger() {
    const finger = document.createElement('div');
    finger.textContent = '🖕';
    finger.style.position = 'absolute';
    finger.style.pointerEvents = 'none';
    finger.style.zIndex = '1';
    finger.style.fontSize = '10px';
    finger.style.opacity = '0';
    finger.style.transform = 'scale(0.3)';
    document.body.appendChild(finger);

    const obj = {
      el: finger,
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2,
      phase: 0,        // 0 = growing, 1 = shrinking
      life: 0,         // 0 to 1 to 0
      speed: 0.005 + Math.random() * 0.005,
      maxSize: 40 + Math.random() * 60,
      rotSpeed: (Math.random() - 0.5) * 3,
      rot: Math.random() * 360,
    };
    fingerEmojis.push(obj);
  }

  function updateFingers() {
    fingerSpawnTimer++;
    if (fingerSpawnTimer % 40 === 0 && fingerEmojis.length < MAX_FINGERS) {
      spawnFinger();
    }

    for (let i = fingerEmojis.length - 1; i >= 0; i--) {
      const f = fingerEmojis[i];

      // Life goes 0 -> 1 -> 0
      if (f.phase === 0) {
        f.life += f.speed;
        if (f.life >= 1) { f.life = 1; f.phase = 1; }
      } else {
        f.life -= f.speed;
        if (f.life <= 0) {
          f.el.remove();
          fingerEmojis.splice(i, 1);
          continue;
        }
      }

      // Drift randomly
      f.vx += (Math.random() - 0.5) * 0.15;
      f.vy += (Math.random() - 0.5) * 0.15;
      f.vx *= 0.99;
      f.vy *= 0.99;
      f.x += f.vx;
      f.y += f.vy;
      f.rot += f.rotSpeed;

      // Scale: small -> big -> small using sin curve
      const t = Math.sin(f.life * Math.PI);
      const size = 10 + t * f.maxSize;
      const alpha = t * 0.6;

      f.el.style.left = f.x + 'px';
      f.el.style.top = f.y + 'px';
      f.el.style.fontSize = size + 'px';
      f.el.style.opacity = alpha;
      f.el.style.transform = `rotate(${f.rot}deg)`;
    }
  }

  // --- Main animation loop ---
  function animate() {
    const rect = el.getBoundingClientRect();
    const w = window.innerWidth;
    const h = window.innerHeight;

    x += dx;
    y += dy;

    let hit = false;
    let hitX = x, hitY = y;

    if (x + rect.width >= w) {
      x = w - rect.width; dx = -dx; hit = true;
      hitX = w; hitY = y + rect.height / 2;
    } else if (x <= 0) {
      x = 0; dx = -dx; hit = true;
      hitX = 0; hitY = y + rect.height / 2;
    }

    if (y + rect.height >= h) {
      y = h - rect.height; dy = -dy; hit = true;
      hitX = x + rect.width / 2; hitY = h;
    } else if (y <= 0) {
      y = 0; dy = -dy; hit = true;
      hitX = x + rect.width / 2; hitY = 0;
    }

    if (hit) {
      colorIndex = (colorIndex + 1) % colors.length;
      setColor(colorIndex);
      bounceScale = 1.3;
      el.style.animation = 'shake 0.4s ease-out';
      setTimeout(() => { el.style.animation = ''; }, 400);
      spawnParticles(hitX, hitY, colors[colorIndex][0]);
      spawnParticles(hitX, hitY, colors[colorIndex][1]);
      flashScreen(colors[colorIndex][0]);
    }

    bounceScale += (1 - bounceScale) * 0.1;
    rotation += 0.3;

    // Trail every few frames
    trailCounter++;
    if (trailCounter % 4 === 0) spawnTrail();

    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.transform = `rotate(${Math.sin(rotation * 0.05) * 8}deg) scale(${bounceScale})`;

    drawStars();
    updateFingers();
    requestAnimationFrame(animate);
  }

  animate();
</script>
</body>
</html>
